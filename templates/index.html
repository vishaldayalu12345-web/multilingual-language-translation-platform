<!doctype html>
<html>
  <head>
    <title>Multilingual AI Language Learning Platform</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <h1>Multilingual AI Language Learning Platform</h1>

    <h2>Translate Languages with AI</h2>

    <form method="POST">
      <label>Enter Text:</label><br />

      <textarea name="text" rows="5" cols="50">{{ text }}</textarea>

      <br /><br />

      <label>Source Language:</label>

      <select name="source_language">
        <option {% if source_language == "English" %}selected{% endif %}>
    English
</option>
        <option {% if source_language == "Kannada" %}selected{% endif %}>
    Kannada
</option>
        <option {% if source_language == "Marathi" %}selected{% endif %}>
    Marathi
</option>
        <option {% if source_language == "Telugu" %}selected{% endif %}>
    Telugu
</option>
        <option {% if source_language == "Hindi" %}selected{% endif %}>
    Hindi
</option>
        <option {% if source_language == "Punjabi" %}selected{% endif %}>
    Punjabi
</option>
      </select>

      <br /><br />

      <label>Target Language:</label>

      <select name="target_language">
        <option {% if target_language == "English" %}selected{% endif %}>
    English
</option>
        <option {% if target_language == "Kannada" %}selected{% endif %}>
    Kannada
</option>
        <option {% if target_language == "Marathi" %}selected{% endif %}>
    Marathi
</option>
        <option {% if target_language == "Telugu" %}selected{% endif %}>
    Telugu
</option>
        <option {% if target_language == "Hindi" %}selected{% endif %}>
    Hindi
</option>
        <option {% if target_language == "Punjabi" %}selected{% endif %}>
    Punjabi
</option>
      </select>

      <br /><br />

      <button type="submit">Translate</button>
    </form>
    <hr />

    <h3>You Entered</h3>

    <p><strong>Text:</strong> {{ text }}</p>

    <p><strong>Source Language:</strong> {{ source_language }}</p>

    <p><strong>Target Language:</strong> {{ target_language }}</p>

    <h3>Translated Text</h3>

<textarea rows="5" cols="50" readonly>
{{ translated_text }}
</textarea>
  </body>
</html>
